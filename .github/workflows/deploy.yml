name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zflix

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="ghcr.io/${{ github.repository_owner }}/zflix:latest"
            APP_DIR="/opt/zflix"

            echo "==> Pulling latest image..."
            docker pull "${IMAGE}"

            echo "==> Starting updated app container..."
            cd "${APP_DIR}"
            docker compose up -d app

            echo "==> Waiting for health check to pass..."
            MAX_WAIT=120
            ELAPSED=0
            until docker inspect --format='{{.State.Health.Status}}' zflix-app 2>/dev/null | grep -q "healthy"; do
              if [ "${ELAPSED}" -ge "${MAX_WAIT}" ]; then
                echo "ERROR: Health check timed out after ${MAX_WAIT}s"
                docker logs zflix-app --tail 50
                exit 1
              fi
              echo "  Waiting... (${ELAPSED}s elapsed)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            echo "  App is healthy."

            echo "==> Running database migrations..."
            docker exec zflix-app npx prisma migrate deploy

            echo "==> Pruning old images..."
            docker image prune -f

            echo "==> Deployment complete."
